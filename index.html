<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carta secreta</title>

<style>

body{
background:#000000;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:20px;
overflow:hidden;
}

/* LOGIN */
#login{
margin-top:80px;
}

input{
padding:12px;
margin:8px;
width:80%;
max-width:300px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px 25px;
font-size:16px;
border-radius:10px;
border:none;
background:#ff4d6d;
color:white;
}

/* REGALO */
#regalo{
font-size:22px;
cursor:pointer;
animation: brincar 1s infinite;
margin-top:40px;
background:#ff4d6d;
color:white;
border:none;
padding:15px 25px;
border-radius:12px;
}

@keyframes brincar{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* CARTA */
#mensaje{
display:none;
}

.carta{
font-family:"Book Antiqua", serif;
font-weight:bold;
font-size:18px;
width:90%;
margin:auto;
line-height:1.6;
min-height:200px;
}

.att{
font-family:"Segoe UI Black", sans-serif;
font-size:20px;
margin-top:30px;
}

/* SEGUNDA CLAVE */
#segundaClaveBox{
display:none;
margin-top:50px;
}

/* POPUP */
#popupFinal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:10;
}

.popupContenido{
background:#111;
padding:25px;
border-radius:15px;
width:85%;
max-width:320px;
text-align:center;
animation: aparecer 0.5s ease;
}

.popupContenido h2{
color:#ff4d6d;
}

.popupContenido button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
}

@keyframes aparecer{
from{transform:scale(0.7); opacity:0;}
to{transform:scale(1); opacity:1;}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Acceso secreto 🔐</h2>

<input type="text" id="user" placeholder="Usuario"><br>
<input type="password" id="pass" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>
</div>

<!-- REGALO -->
<div id="regaloBox" style="display:none;">
<h2>Tengo algo para ti 🎁</h2>

<button id="regalo" onclick="mostrarSegundaClave()">
🎁 Abrir regalo 🎁
</button>
</div>

<!-- SEGUNDA CONTRASEÑA -->
<div id="segundaClaveBox">
<h3>Ups... contraseña 👀</h3>
<input type="password" id="segundaClave" placeholder="Escríbela aquí"><br>
<button onclick="verificarSegundaClave()">Abrir regalo</button>
</div>

<!-- MENSAJE -->
<div id="mensaje">
<div id="texto" class="carta"></div>

<div class="att">
ATT: EL CRACK, IDOLO, GUAPO, ASOMBROZO DE TU AMIGUITO.
</div>
</div>

<!-- POPUP FINAL -->
<div id="popupFinal">
  <div class="popupContenido">
    <h2>✨ Sorpresa ✨</h2>
    <p>Déjame hacer que esos ojos brillen aún más 💖</p>
    <p>Si llegaste hasta aquí... tienes que decir la palabra mágica:</p>
    <h3>👉 REGALO 👈</h3>
    <p>al dueño de esto 😏</p>

    <button onclick="cerrarPopup()">Cerrar</button>
  </div>
</div>

<canvas id="estrellas"></canvas>

<script>

var carta = `Holaa, Ojos lindos, espero que este día este lleno de bendiciones especiales ya que es un día especial, es tu cumpleaños, quiero felicitarte por esta cartita, ¡FELIZ CUMPLEAÑOS EVANGELINE!

Quiero decirte en lo personal que jamás cambies eres una persona muy carismática, linda, enojona, chillona entre otras cosas que te complementan y te hacen especial, gracias por el poco tiempo que llevamos conociéndonos, me has sacado risas y canas verdes, te considero una amiga muy cercana a mí que sin dudarlo te diría mis problemas, te quiero mucho mucho mucho amiguita.`;


/* LOGIN */
function login(){

var usuario="evangeline";
var contraseña="cumple";

var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;

if(u==usuario && p==contraseña){

document.getElementById("login").style.display="none";
document.getElementById("regaloBox").style.display="block";

}else{
alert("Usuario o contraseña incorrectos");
}

}

/* MOSTRAR SEGUNDA CLAVE */
function mostrarSegundaClave(){
document.getElementById("regaloBox").style.display="none";
document.getElementById("segundaClaveBox").style.display="block";
}

/* VALIDAR SEGUNDA CLAVE */
function verificarSegundaClave(){

let clave = document.getElementById("segundaClave").value;

if(clave === "Me encantan tus ojos"){

document.getElementById("segundaClaveBox").style.display="none";
document.getElementById("mensaje").style.display="block";

escribirTexto();
estrellas();

}else{
alert("Contraseña incorrecta 😝");
}

}

/* ESCRITURA */
function escribirTexto(){

let i = 0;
let velocidad = 35;
let texto = document.getElementById("texto");

texto.innerHTML = "";

function escribir(){

if(i < carta.length){

texto.innerHTML += carta.charAt(i);
i++;
setTimeout(escribir, velocidad);

}else{
setTimeout(mostrarPopup, 800);
}

}

escribir();

}

/* POPUP */
function mostrarPopup(){
document.getElementById("popupFinal").style.display = "flex";
}

function cerrarPopup(){
document.getElementById("popupFinal").style.display = "none";
}

/* ESTRELLAS */
function estrellas(){

const canvas = document.getElementById("estrellas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

let stars = [];

for(let i=0;i<120;i++){
stars.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2+1,
speed: Math.random()*1+0.3
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let i=0;i<stars.length;i++){
let s = stars[i];
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();
}

update();
}

function update(){
for(let i=0;i<stars.length;i++){
let s = stars[i];
s.y += s.speed;

if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}
}
}

setInterval(draw,20);
}

</script>

</body>
</html>
